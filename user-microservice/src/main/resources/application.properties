server.port=8090
spring.application.name=user-service

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/usersmicrosrvice
spring.data.mongodb.auto-index-creation=true

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.hostname=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Spring Cloud Config
spring.cloud.config.enabled=false
spring.config.import=optional:configserver:

# Security
spring.security.user.name=disabled
spring.security.user.password=disabled

# Management
management.endpoints.web.exposure.include=*

# Supprimer le warning hostname
logging.level.org.springframework.cloud.commons.util.InetUtils=ERROR

